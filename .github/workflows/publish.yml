name: Release — PyPI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  # Gate on existing CI workflows
  test:
    uses: ./.github/workflows/test.yml
  lint:
    uses: ./.github/workflows/lint.yml

  # =========================================================================
  # Tag, create GitHub Release, publish to PyPI
  # =========================================================================
  release:
    needs: [test, lint]
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Bump version and push tag
        id: bump_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          default_bump: patch
          tag_prefix: 'v'

      - name: Update VERSION file
        run: |
          echo "${{ steps.bump_version.outputs.new_version }}" > VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to v${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push origin main

      - name: Fetch latest PR info
        id: fetch_pr
        uses: actions/github-script@v6
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'closed', base: 'main',
              sort: 'updated', direction: 'desc', per_page: 1,
            });
            if (prs.data.length > 0) {
              const pr = prs.data[0];
              return {
                title: pr.title,
                body: (pr.body || 'No description provided').replace(/\r\n/g, '\n'),
                number: pr.number,
                url: pr.html_url,
                author: pr.user.login,
              };
            }
            return null;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          name: v${{ steps.bump_version.outputs.new_version }}
          body: |
            ## Install

            ```bash
            pip install after-effects-automation==${{ steps.bump_version.outputs.new_version }}
            ```

            ---

            ## Changes
            ${{ steps.fetch_pr.outputs.result != 'null' && fromJSON(steps.fetch_pr.outputs.result).body || steps.bump_version.outputs.changelog }}

            ## Details
            - Version: `v${{ steps.bump_version.outputs.new_version }}`
            ${{ steps.fetch_pr.outputs.result != 'null' && format('- PR: #{0} by @{1}', fromJSON(steps.fetch_pr.outputs.result).number, fromJSON(steps.fetch_pr.outputs.result).author) || '' }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Build and publish to PyPI
        run: |
          pip install --upgrade pip build twine
          echo "${{ steps.bump_version.outputs.new_version }}" > VERSION
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
